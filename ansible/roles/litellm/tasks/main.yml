---
# ===== LiteLLM Proxy デプロイ =====
# 前提: setup ロールで /opt/litellm がログインユーザー所有で作成済み
#       ログインユーザーは docker グループに所属済み

- name: Vault 暗号化変数を読み込み
  ansible.builtin.include_vars:
      file: vault.yml

# LiteLLM Proxy コンテナは cap_drop: [ALL] + no-new-privileges で起動するため、
# root でも他ユーザーの 0600 ファイルを読めない。config.yaml はシークレットを含まない
# （master_key は環境変数参照、model_list は DB 管理）ため 0644 で配置する。
- name: LiteLLM Proxy 設定ファイルを配置
  ansible.builtin.template:
      src: config.yaml.j2
      dest: '{{ litellm_install_dir }}/config.yaml'
      mode: '0644'
  notify: LiteLLM を再起動

- name: Docker-compose.yml を配置
  ansible.builtin.template:
      src: docker-compose.yml.j2
      dest: '{{ litellm_install_dir }}/docker-compose.yml'
      mode: '0600'
  notify: LiteLLM を再起動

- name: LiteLLM コンテナを起動
  community.docker.docker_compose_v2:
      project_src: '{{ litellm_install_dir }}'
      state: present
      pull: always
