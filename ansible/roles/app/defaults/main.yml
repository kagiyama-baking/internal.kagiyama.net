---
# アプリケーション（kawashiro-server）設定

# インストールディレクトリ
app_install_dir: /opt/app

# Docker イメージ
app_django_image: 'ghcr.io/kagiyama-baking/kawashiro-server/django-api:release'
app_frontend_image: 'ghcr.io/kagiyama-baking/kawashiro-server/frontend:release'

# Django API 設定
app_django_workers: 4
app_django_timeout: 1200

# TTS サービス接続先（Tailscale経由の外部ホスト）
app_sbv2_service_url: http://100.72.34.43:5000

# リソース制限: django-api
app_django_mem_limit: 512m
app_django_cpus: 1.0

# PostgreSQL データベース設定
app_db_image: pgvector/pgvector:pg17
app_db_username: kawashiro
app_db_database_name: kawashiro
app_db_data_location: /opt/app/postgres

# リソース制限: database
app_db_mem_limit: 256m
app_db_cpus: 0.5

# Redis 設定
app_redis_image: redis:7-alpine

# Celery ワーカー設定
app_celery_worker_concurrency: 2
app_celery_worker_mem_limit: 512m
app_celery_worker_cpus: 1.0

# リソース制限: celery-beat
app_celery_beat_mem_limit: 128m
app_celery_beat_cpus: 0.25

# リソース制限: redis
app_redis_mem_limit: 128m
app_redis_cpus: 0.25

# リソース制限: frontend
app_frontend_mem_limit: 128m
app_frontend_cpus: 0.5

# LiteLLM Proxy 設定（LLMゲートウェイ、Traefik経由）
app_litellm_proxy_url: https://litellm.internal.kagiyama.net/v1

# Langfuse LLMOps 設定
app_langfuse_base_url: https://langfuse.internal.kagiyama.net
app_langfuse_tracing_environment: prd
