---
# ===== Observability スタック デプロイ =====
# 前提: setup ロールで /opt/observability がログインユーザー所有で作成済み
#       ログインユーザーは docker グループに所属済み
# サブディレクトリ (grafana/, dashboards/) はこのロール内で作成する
# （設定ファイルの種類が多く、ロール固有の構造のため）

- name: Vault 暗号化変数を読み込み
  ansible.builtin.include_vars:
      file: vault.yml

- name: Grafana 設定ディレクトリを作成
  ansible.builtin.file:
      path: '{{ observability_install_dir }}/grafana'
      state: directory
      mode: '0755'

- name: ダッシュボードディレクトリを作成
  ansible.builtin.file:
      path: '{{ observability_install_dir }}/dashboards'
      state: directory
      mode: '0755'

- name: Loki データディレクトリを作成
  ansible.builtin.file:
      path: '{{ observability_install_dir }}/loki-data'
      state: directory
      mode: '0755'

- name: Grafana 環境変数ファイルを配置
  ansible.builtin.template:
      src: grafana.env.j2
      dest: '{{ observability_install_dir }}/grafana.env'
      mode: '0600'
  notify: Observability を再起動

- name: Docker Compose 設定を配置
  ansible.builtin.template:
      src: docker-compose.yml.j2
      dest: '{{ observability_install_dir }}/docker-compose.yml'
      mode: '0600'
  notify: Observability を再起動

- name: Prometheus 設定を配置
  ansible.builtin.template:
      src: prometheus.yml.j2
      dest: '{{ observability_install_dir }}/prometheus.yml'
      mode: '0644'
  notify: Observability を再起動

- name: Loki 設定を配置
  ansible.builtin.template:
      src: loki.yml.j2
      dest: '{{ observability_install_dir }}/loki.yml'
      mode: '0644'
  notify: Observability を再起動

- name: Promtail 設定を配置
  ansible.builtin.template:
      src: promtail.yml.j2
      dest: '{{ observability_install_dir }}/promtail.yml'
      mode: '0644'
  notify: Observability を再起動

- name: Grafana データソース設定を配置
  ansible.builtin.template:
      src: grafana/datasources.yml.j2
      dest: '{{ observability_install_dir }}/grafana/datasources.yml'
      mode: '0644'
  notify: Observability を再起動

- name: Grafana アラート設定ディレクトリを作成
  ansible.builtin.file:
      path: '{{ observability_install_dir }}/grafana/alerting'
      state: directory
      mode: '0755'

- name: Grafana コンタクトポイント設定を配置
  ansible.builtin.template:
      src: grafana/alerting/contactpoints.yml.j2
      dest: '{{ observability_install_dir }}/grafana/alerting/contactpoints.yml'
      mode: '0644'
  notify: Observability を再起動

- name: Grafana 通知ポリシー設定を配置
  ansible.builtin.template:
      src: grafana/alerting/policies.yml.j2
      dest: '{{ observability_install_dir }}/grafana/alerting/policies.yml'
      mode: '0644'
  notify: Observability を再起動

- name: Grafana アラートルール設定を配置
  ansible.builtin.template:
      src: grafana/alerting/rules.yml.j2
      dest: '{{ observability_install_dir }}/grafana/alerting/rules.yml'
      mode: '0644'
  notify: Observability を再起動

- name: Grafana ダッシュボードプロバイダ設定を配置
  ansible.builtin.template:
      src: grafana/dashboards.yml.j2
      dest: '{{ observability_install_dir }}/grafana/dashboards.yml'
      mode: '0644'
  notify: Observability を再起動

- name: ダッシュボード JSON を配置（削除されたファイルも同期）
  ansible.posix.synchronize:
      src: '{{ role_path }}/files/dashboards/'
      dest: '{{ observability_install_dir }}/dashboards/'
      delete: true
  delegate_to: '{{ inventory_hostname }}'
  notify: Observability を再起動

- name: Observability コンテナを起動
  community.docker.docker_compose_v2:
      project_src: '{{ observability_install_dir }}'
      state: present
      pull: missing
