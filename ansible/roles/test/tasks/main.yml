---
- name: Ansibleの動作確認
  ansible.builtin.ping:

- name: ホスト名を取得
  ansible.builtin.command: hostname
  register: test_hostname_result
  changed_when: false

- name: ホスト名を表示
  ansible.builtin.debug:
      msg: 'ホスト名: {{ test_hostname_result.stdout }}'

- name: OSバージョンを取得
  ansible.builtin.command: lsb_release -d
  register: test_os_result
  changed_when: false

- name: OSバージョンを表示
  ansible.builtin.debug:
      msg: 'OS: {{ test_os_result.stdout }}'
