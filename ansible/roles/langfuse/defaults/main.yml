---
# LangFuse v3 設定

# インストールディレクトリ
langfuse_install_dir: /opt/langfuse

# データ保存先（永続ボリューム）
langfuse_db_data_location: /opt/langfuse/postgres
langfuse_clickhouse_data_location: /opt/langfuse/clickhouse
# Docker イメージ
langfuse_web_image: langfuse/langfuse:3
langfuse_worker_image: langfuse/langfuse-worker:3
langfuse_db_image: postgres:17
langfuse_clickhouse_image: clickhouse/clickhouse-server:latest
langfuse_redis_image: redis:7-alpine

# アプリケーション設定
langfuse_nextauth_url: 'https://{{ langfuse_traefik_host }}'
langfuse_web_port: 3000
langfuse_worker_port: 3030

# PostgreSQL 設定
langfuse_db_username: langfuse
langfuse_db_database_name: langfuse

# ClickHouse 設定
langfuse_clickhouse_user: langfuse
langfuse_clickhouse_database: default

# ClickHouse メモリチューニング（コンテナ 1.5GB 向け）
langfuse_clickhouse_max_server_memory_usage: 1150000000   # ~1.1GB（絶対値で固定）
langfuse_clickhouse_mark_cache_size: 268435456            # 256MB（デフォルト5GBから削減）
langfuse_clickhouse_uncompressed_cache_size: 67108864     # 64MB
langfuse_clickhouse_max_memory_usage: 1073741824          # 1GB/クエリ
langfuse_clickhouse_max_memory_usage_for_user: 1073741824 # 1GB/ユーザー
langfuse_clickhouse_background_pool_size: 2
langfuse_clickhouse_system_log_ttl_days: 3

# AWS S3 設定
langfuse_s3_region: ap-northeast-1
langfuse_s3_event_bucket: kagiyama-baking-langfuse-event
langfuse_s3_media_bucket: kagiyama-baking-langfuse-media
langfuse_s3_export_bucket: kagiyama-baking-langfuse-export

# リソース制限: langfuse-web
langfuse_web_mem_limit: 2g
langfuse_web_cpus: 2.0

# リソース制限: langfuse-worker
langfuse_worker_mem_limit: 2g
langfuse_worker_cpus: 2.0

# リソース制限: PostgreSQL
langfuse_db_mem_limit: 1g
langfuse_db_cpus: 1.0

# リソース制限: ClickHouse
langfuse_clickhouse_mem_limit: 1536m
langfuse_clickhouse_cpus: 0.5

# リソース制限: Redis
langfuse_redis_mem_limit: 256m
langfuse_redis_cpus: 0.5
