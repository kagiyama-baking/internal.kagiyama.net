---
# LangFuse v3 設定

# インストールディレクトリ
langfuse_install_dir: /opt/langfuse

# データ保存先（永続ボリューム）
langfuse_db_data_location: /opt/langfuse/postgres
langfuse_clickhouse_data_location: /opt/langfuse/clickhouse
langfuse_minio_data_location: /opt/langfuse/minio

# Docker イメージ
langfuse_web_image: langfuse/langfuse:3
langfuse_worker_image: langfuse/langfuse-worker:3
langfuse_db_image: postgres:17
langfuse_clickhouse_image: clickhouse/clickhouse-server:latest
langfuse_redis_image: redis:7-alpine
langfuse_minio_image: quay.io/minio/minio:latest

# アプリケーション設定
langfuse_nextauth_url: 'https://{{ langfuse_traefik_host }}'
langfuse_web_port: 3000
langfuse_worker_port: 3030

# PostgreSQL 設定
langfuse_db_username: langfuse
langfuse_db_database_name: langfuse

# ClickHouse 設定
langfuse_clickhouse_user: langfuse
langfuse_clickhouse_database: default

# S3 / MinIO 設定
langfuse_s3_region: auto
langfuse_s3_force_path_style: 'true'
langfuse_s3_event_bucket: langfuse
langfuse_s3_media_bucket: langfuse-media
langfuse_s3_export_bucket: langfuse-export
langfuse_s3_endpoint: http://langfuse-minio:9000

# リソース制限: langfuse-web
langfuse_web_mem_limit: 2g
langfuse_web_cpus: 2.0

# リソース制限: langfuse-worker
langfuse_worker_mem_limit: 2g
langfuse_worker_cpus: 2.0

# リソース制限: PostgreSQL
langfuse_db_mem_limit: 1g
langfuse_db_cpus: 1.0

# リソース制限: ClickHouse
langfuse_clickhouse_mem_limit: 4g
langfuse_clickhouse_cpus: 2.0

# リソース制限: Redis
langfuse_redis_mem_limit: 256m
langfuse_redis_cpus: 0.5

# リソース制限: MinIO
langfuse_minio_mem_limit: 1g
langfuse_minio_cpus: 1.0
