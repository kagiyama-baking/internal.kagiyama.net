---
# ===== CoreDNS デプロイ =====
# 前提: setup ロールで /opt/coredns がログインユーザー所有で作成済み
#       ログインユーザーは docker グループに所属済み

- name: Docker-compose.yml を配置
  ansible.builtin.template:
      src: docker-compose.yml.j2
      dest: '{{ coredns_install_dir }}/docker-compose.yml'
      mode: '0644'
  notify: CoreDNS を再起動

- name: Corefile を配置
  ansible.builtin.template:
      src: Corefile.j2
      dest: '{{ coredns_install_dir }}/config/Corefile'
      mode: '0644'
  notify: CoreDNS を再起動

- name: Custom.hosts を配置
  ansible.builtin.template:
      src: custom.hosts.j2
      dest: '{{ coredns_install_dir }}/config/custom.hosts'
      mode: '0644'
  notify: CoreDNS を再起動

- name: CoreDNS コンテナを起動
  community.docker.docker_compose_v2:
      project_src: '{{ coredns_install_dir }}'
      state: present
      pull: missing
