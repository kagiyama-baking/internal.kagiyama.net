---
# CoreDNS 設定ディレクトリ
coredns_install_dir: /opt/coredns

# Docker イメージ
coredns_image: coredns/coredns:1.12.0

# バインドアドレス（内部ネットワーク専用の場合は特定のIPを指定）
coredns_bind_address: '0.0.0.0'

# 上流 DNS サーバ
coredns_upstream_dns:
    - 8.8.8.8
    - 8.8.4.4

# キャッシュ TTL（秒）
coredns_cache_ttl: 30

# DNS レコード（vars/main.yml に定義。IPは vars/vault.yml の vault 変数を参照）
# coredns_dns_records:
#   - ip: "{{ coredns_vault_ip_example }}"
#     hostnames:
#       - example.internal
