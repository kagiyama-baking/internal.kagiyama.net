---
# ===== 日本語化 =====
- name: 日本語言語パックをインストール
  ansible.builtin.apt:
      name:
          - language-pack-ja
      state: present
      update_cache: true
  become: true

- name: Ja_JP.UTF-8ロケールを生成
  community.general.locale_gen:
      name: ja_JP.UTF-8
      state: present
  become: true

- name: デフォルトロケールをja_JP.UTF-8に設定
  ansible.builtin.lineinfile:
      path: /etc/default/locale
      regexp: '^LANG='
      line: 'LANG=ja_JP.UTF-8'
  become: true

- name: タイムゾーンをAsia/Tokyoに設定
  community.general.timezone:
      name: Asia/Tokyo
  become: true

# ===== DNS（systemd-resolved スタブリスナー無効化） =====
# CoreDNS がポート53を使用するため、systemd-resolved のスタブリスナーを停止する
- name: Systemd-resolved のスタブリスナーを無効化
  ansible.builtin.lineinfile:
      path: /etc/systemd/resolved.conf
      regexp: '^#?DNSStubListener='
      line: 'DNSStubListener=no'
  become: true
  notify: Systemd-resolved を再起動

- name: /etc/resolv.conf の状態を確認
  ansible.builtin.stat:
      path: /etc/resolv.conf
  register: setup_resolv_conf

- name: /etc/resolv.conf のシンボリックリンクを変更
  ansible.builtin.file:
      src: /run/systemd/resolve/resolv.conf
      dest: /etc/resolv.conf
      state: link
      force: true
  become: true
  notify: Systemd-resolved を再起動
  when: setup_resolv_conf.stat.islnk

# ===== Docker =====
- name: 必要なパッケージをインストール
  ansible.builtin.apt:
      name:
          - ca-certificates
          - curl
          - gnupg
      state: present
      update_cache: true
  become: true

- name: Docker公式GPGキーのディレクトリを作成
  ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: '0755'
  become: true

- name: Docker公式GPGキーを追加
  ansible.builtin.get_url:
      url: https://download.docker.com/linux/ubuntu/gpg
      dest: /etc/apt/keyrings/docker.asc
      mode: '0644'
  become: true

- name: Dockerリポジトリを追加
  ansible.builtin.apt_repository:
      repo: >-
          deb [arch={{ ansible_facts['architecture']
          | regex_replace('x86_64', 'amd64')
          | regex_replace('aarch64', 'arm64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_facts['distribution_release'] }} stable
      filename: docker
      state: present
  become: true

- name: Dockerパッケージをインストール
  ansible.builtin.apt:
      name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
      state: present
      update_cache: true
  become: true

- name: Dockerサービスを有効化・起動
  ansible.builtin.systemd:
      name: docker
      enabled: true
      state: started
  become: true

- name: ユーザーをdockerグループに追加
  ansible.builtin.user:
      name: "{{ ansible_facts['user_id'] }}"
      groups: docker
      append: true
  become: true

# ===== アプリケーションディレクトリ =====
- name: /opt配下のアプリケーションディレクトリを作成
  ansible.builtin.file:
      path: '{{ item }}'
      state: directory
      owner: "{{ ansible_facts['user_id'] }}"
      group: "{{ ansible_facts['user_id'] }}"
      mode: '0755'
  loop:
      - /opt/coredns
      - /opt/coredns/config
      - /opt/portainer
      - /opt/traefik
      - /opt/immich
      - /opt/observability
  become: true
