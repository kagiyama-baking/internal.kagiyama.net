---
name: Deploy

on:
    workflow_dispatch:
        inputs:
            roles:
                description: 'デプロイ対象ロール（カンマ区切り）'
                required: true
                default: 'coredns,traefik,portainer,immich,observability,app'
                type: string
    push:
        branches: [main]
        paths:
            - 'ansible/**'
            - '!ansible/**/*.md'

concurrency:
    group: deploy-production
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: production
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: 変更されたロールを検出
              id: changes
              env:
                  INPUT_ROLES: ${{ inputs.roles }}
              run: |
                  ALLOWED_ROLES="coredns traefik portainer immich observability app"

                  # 手動実行時は入力値を許可リストで検証
                  if [ -n "$INPUT_ROLES" ]; then
                    IFS=',' read -ra REQUESTED <<< "$INPUT_ROLES"
                    VALIDATED=""
                    for r in "${REQUESTED[@]}"; do
                      r=$(echo "$r" | tr -d '[:space:]')
                      if echo "$ALLOWED_ROLES" | grep -qw "$r"; then
                        VALIDATED="${VALIDATED:+$VALIDATED,}$r"
                      else
                        echo "::error::不正なロール名: $r"
                        exit 1
                      fi
                    done
                    echo "roles=$VALIDATED" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  # CD対象ロール（setup: --ask-become-pass必要、test: テスト用のため除外）
                  if git rev-parse HEAD^2 >/dev/null 2>&1; then
                    # マージコミット: マージベースとの差分を取る
                    MERGE_BASE=$(git merge-base HEAD^1 HEAD^2)
                    CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD)
                  elif ! CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null); then
                    echo "::warning::前コミットとの差分を取得できません。全ロールをデプロイします。"
                    echo "roles=coredns,traefik,portainer,immich,observability,app" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  # 全ロール対象のパスが変更された場合
                  if echo "$CHANGED" | grep -qE '^ansible/(group_vars/|site\.yml)'; then
                    echo "roles=coredns,traefik,portainer,immich,observability,app" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  ROLES=""
                  for role in coredns traefik portainer immich observability app; do
                    if echo "$CHANGED" | grep -q "ansible/roles/$role/"; then
                      ROLES="${ROLES:+$ROLES,}$role"
                    fi
                  done
                  echo "roles=$ROLES" >> "$GITHUB_OUTPUT"

            - name: デプロイ対象なし
              if: steps.changes.outputs.roles == ''
              run: echo "デプロイ対象のロール変更なし、スキップ"

            - name: Tailscale接続
              if: steps.changes.outputs.roles != ''
              uses: tailscale/github-action@v4
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:ci

            - name: デプロイスクリプトを生成
              if: steps.changes.outputs.roles != ''
              run: |
                  cat > /tmp/deploy.sh << 'SCRIPT'
                  #!/bin/bash
                  set -euo pipefail

                  cd "$DEPLOY_DIR"
                  git checkout main
                  git pull origin main

                  VAULT_FILE="/tmp/.vault_pass_ci"
                  chmod 600 "$VAULT_FILE"
                  trap 'rm -f "$VAULT_FILE"' EXIT

                  cd ansible
                  IFS=',' read -ra ROLES <<< "$CHANGED_ROLES"
                  for role in "${ROLES[@]}"; do
                    echo ">>> Deploying: $role"
                    if [ "$role" = "portainer" ]; then
                      ansible-playbook site.yml --tags "$role"
                    else
                      ansible-playbook site.yml --tags "$role" --vault-password-file "$VAULT_FILE"
                    fi
                  done
                  SCRIPT
                  chmod +x /tmp/deploy.sh

            - name: デプロイ実行
              if: steps.changes.outputs.roles != ''
              env:
                  VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
                  SSH_HOST: ${{ secrets.SSH_HOST }}
                  SSH_USER: ${{ secrets.SSH_USER }}
                  DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
                  CHANGED_ROLES: ${{ steps.changes.outputs.roles }}
              run: |
                  SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=30"
                  REMOTE="${SSH_USER}@${SSH_HOST}"
                  DEPLOY_ID="deploy_$(date +%s)_$$"

                  # Vaultパスワードをファイルとして転送（引数に含めない）
                  VAULT_TMP=$(mktemp)
                  echo -n "${VAULT_PASSWORD}" > "$VAULT_TMP"
                  chmod 600 "$VAULT_TMP"

                  # デプロイスクリプトとVaultファイルを転送
                  scp $SSH_OPTS "$VAULT_TMP" "${REMOTE}":/tmp/.vault_pass_ci
                  scp $SSH_OPTS /tmp/deploy.sh "${REMOTE}":"/tmp/${DEPLOY_ID}.sh"
                  rm -f "$VAULT_TMP"

                  # 環境変数経由でパラメータを渡す（引数に含めない）
                  ssh $SSH_OPTS "${REMOTE}" \
                      "DEPLOY_DIR='${DEPLOY_DIR}' CHANGED_ROLES='${CHANGED_ROLES}' bash /tmp/${DEPLOY_ID}.sh; rm -f /tmp/${DEPLOY_ID}.sh"
