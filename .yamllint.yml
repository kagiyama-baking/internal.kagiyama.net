---
extends: default

ignore:
    - "ansible/roles/*/vars/vault.yml"

rules:
    line-length:
        max: 120
    indentation:
        spaces: 4
        indent-sequences: true
    truthy:
        allowed-values: ["true", "false", "yes", "no"]
    comments:
        min-spaces-from-content: 1
    braces:
        min-spaces-inside: 1
        max-spaces-inside: 1
    brackets:
        min-spaces-inside: 0
        max-spaces-inside: 0
